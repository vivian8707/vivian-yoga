<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>溝通板 — 醫院使用</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --display-bg: #1a1a2e;
      --display-text: #ffffff;
      --display-placeholder: #6c7a99;
      --btn-letter: #ffffff;
      --btn-letter-border: #c8d0e0;
      --btn-letter-active: #d0e8ff;
      --btn-phrase: #fff3e0;
      --btn-phrase-border: #ffb74d;
      --btn-phrase-active: #ffe0b2;
      --btn-space: #e8f5e9;
      --btn-space-border: #81c784;
      --btn-back: #fff3f3;
      --btn-back-border: #ef9a9a;
      --btn-back-active: #ffcdd2;
      --btn-clear: #fce4ec;
      --btn-clear-border: #f48fb1;
      --btn-clear-active: #f8bbd0;
      --shadow: 0 2px 6px rgba(0,0,0,0.12);
      --shadow-press: 0 1px 2px rgba(0,0,0,0.08);
      --radius: 14px;
      --text-primary: #1a1a2e;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 12px;
      gap: 10px;
    }

    /* ── Display area ── */
    #display-wrap {
      flex: 0 0 auto;
      background: var(--display-bg);
      border-radius: var(--radius);
      padding: 18px 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: var(--shadow);
      min-height: 110px;
    }

    #display-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7888aa;
    }

    #display-text {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      color: var(--display-text);
      line-height: 1.25;
      min-height: 1.4em;
      word-break: break-all;
      white-space: pre-wrap;
    }

    #display-text.placeholder {
      color: var(--display-placeholder);
      font-weight: 400;
      font-style: italic;
    }

    /* ── Quick phrases ── */
    #phrases {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .phrase-btn {
      background: var(--btn-phrase);
      border: 2px solid var(--btn-phrase-border);
      border-radius: var(--radius);
      padding: 10px 6px;
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 700;
      color: #7c4700;
      cursor: pointer;
      box-shadow: var(--shadow);
      text-align: center;
      line-height: 1.3;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s, transform 0.08s, box-shadow 0.08s;
    }

    .phrase-btn:active, .phrase-btn.pressed {
      background: var(--btn-phrase-active);
      transform: scale(0.96);
      box-shadow: var(--shadow-press);
    }

    /* ── Keyboard ── */
    #keyboard {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 7px;
      min-height: 0;
    }

    .key {
      background: var(--btn-letter);
      border: 2px solid var(--btn-letter-border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 4vw, 48px);
      font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
      box-shadow: var(--shadow);
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s, transform 0.08s, box-shadow 0.08s;
    }

    .key:active, .key.pressed {
      background: var(--btn-letter-active);
      transform: scale(0.93);
      box-shadow: var(--shadow-press);
    }

    .key.space {
      background: var(--btn-space);
      border-color: var(--btn-space-border);
      color: #2e7d32;
      font-size: clamp(13px, 2vw, 20px);
      font-weight: 700;
    }

    .key.backspace {
      background: var(--btn-back);
      border-color: var(--btn-back-border);
      color: #c62828;
      font-size: clamp(18px, 3vw, 36px);
    }

    .key.backspace:active, .key.backspace.pressed {
      background: var(--btn-back-active);
    }

    .key.clear {
      background: var(--btn-clear);
      border-color: var(--btn-clear-border);
      color: #880e4f;
      font-size: clamp(12px, 1.8vw, 18px);
      font-weight: 700;
    }

    .key.clear:active, .key.clear.pressed {
      background: var(--btn-clear-active);
    }

    .key.empty {
      background: transparent;
      border: none;
      box-shadow: none;
      pointer-events: none;
    }

    /* ── Flash feedback on display ── */
    @keyframes flash {
      0%   { opacity: 1; }
      40%  { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .flash {
      animation: flash 0.18s ease;
    }
  </style>
</head>
<body>

  <!-- 訊息顯示區 -->
  <div id="display-wrap">
    <div id="display-label">目前訊息 Current Message</div>
    <div id="display-text" class="placeholder">（請按下方按鍵開始輸入）</div>
  </div>

  <!-- 快速短句 -->
  <div id="phrases">
    <button class="phrase-btn" data-phrase="我很痛">我很痛<br><small>Pain</small></button>
    <button class="phrase-btn" data-phrase="我渴了">我渴了<br><small>Thirsty</small></button>
    <button class="phrase-btn" data-phrase="我需要護士">我需要護士<br><small>Nurse</small></button>
    <button class="phrase-btn" data-phrase="我不舒服">我不舒服<br><small>Unwell</small></button>
    <button class="phrase-btn" data-phrase="幫我翻身">幫我翻身<br><small>Turn me</small></button>
    <button class="phrase-btn" data-phrase="我想大便">我想大便<br><small>Toilet</small></button>
    <button class="phrase-btn" data-phrase="幫我叫家人">幫我叫家人<br><small>Family</small></button>
    <button class="phrase-btn" data-phrase="謝謝">謝謝<br><small>Thanks</small></button>
  </div>

  <!-- 鍵盤：A-Z 字母順序，5欄6列 -->
  <div id="keyboard">
    <!-- 欄1: A-F -->
    <button class="key" data-char="A">A</button>
    <button class="key" data-char="G">G</button>
    <button class="key" data-char="M">M</button>
    <button class="key" data-char="S">S</button>
    <button class="key" data-char="Y">Y</button>

    <button class="key" data-char="B">B</button>
    <button class="key" data-char="H">H</button>
    <button class="key" data-char="N">N</button>
    <button class="key" data-char="T">T</button>
    <button class="key" data-char="Z">Z</button>

    <button class="key" data-char="C">C</button>
    <button class="key" data-char="I">I</button>
    <button class="key" data-char="O">O</button>
    <button class="key" data-char="U">U</button>
    <button class="key space" data-char=" ">空白<br>Space</button>

    <button class="key" data-char="D">D</button>
    <button class="key" data-char="J">J</button>
    <button class="key" data-char="P">P</button>
    <button class="key" data-char="V">V</button>
    <button class="key backspace" data-action="back">⌫</button>

    <button class="key" data-char="E">E</button>
    <button class="key" data-char="K">K</button>
    <button class="key" data-char="Q">Q</button>
    <button class="key" data-char="W">W</button>
    <button class="key clear" data-action="clear">清除<br>Clear</button>

    <button class="key" data-char="F">F</button>
    <button class="key" data-char="L">L</button>
    <button class="key" data-char="R">R</button>
    <button class="key" data-char="X">X</button>
    <button class="key empty"></button>
  </div>

  <script>
    const displayEl = document.getElementById('display-text');
    let message = '';

    function updateDisplay() {
      if (message === '') {
        displayEl.textContent = '（請按下方按鍵開始輸入）';
        displayEl.classList.add('placeholder');
      } else {
        displayEl.textContent = message;
        displayEl.classList.remove('placeholder');
      }
    }

    function flashDisplay() {
      displayEl.classList.remove('flash');
      void displayEl.offsetWidth;
      displayEl.classList.add('flash');
    }

    function pressEffect(el) {
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 150);
    }

    // Handle all button taps
    document.querySelectorAll('.key, .phrase-btn').forEach(btn => {
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        pressEffect(btn);

        const action = btn.dataset.action;
        const char   = btn.dataset.char;
        const phrase = btn.dataset.phrase;

        if (action === 'back') {
          if (message.length > 0) {
            message = message.slice(0, -1);
            flashDisplay();
          }
        } else if (action === 'clear') {
          if (message.length > 0) {
            message = '';
            flashDisplay();
          }
        } else if (char !== undefined) {
          message += char;
          flashDisplay();
        } else if (phrase !== undefined) {
          if (message.length > 0 && !message.endsWith(' ')) {
            message += ' ';
          }
          message += phrase;
          flashDisplay();
        }

        updateDisplay();
      });
    });

    // Keep screen awake via WakeLock if supported
    async function keepAwake() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
        }
      } catch (_) {}
    }
    keepAwake();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') keepAwake();
    });
  </script>
</body>
</html>
