window.SEED_RECORDS  = DEMO_DATA.records.slice();
window.TABS = ["上課記錄", "儲值記錄", "學生管理", "收入記錄"];

// SAMPLE_* getters (used by variant-d.jsx)
Object.defineProperty(window, "SAMPLE_STUDENTS", {
  get() { return window.Store ? window.Store.getState().students : window.SEED_STUDENTS; }
});
Object.defineProperty(window, "SAMPLE_RECORDS", {
  get() {
    const list = window.Store ? window.Store.getState().records : window.SEED_RECORDS;
    const order = new Map();
    list.forEach((r, i) => order.set(r, i));
    return list.slice().sort((a, b) => {
      const da = a.date || "", db = b.date || "";
      if (da !== db) return db.localeCompare(da);
      return (order.get(b) || 0) - (order.get(a) || 0);
    });
  }
});
Object.defineProperty(window, "SAMPLE_MONTHS", {
  get() { return window.Store ? window.Store.derived.months() : []; }
});

// Silence sync (no sync.js loaded)
window.SyncStatus = {
  get: () => ({ state: "synced", message: "Demo 模式", lastSync: new Date() }),
  subscribe(fn) { fn(window.SyncStatus.get()); return () => {}; },
  forcePush: () => {}, forcePull: () => {},
