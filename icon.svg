<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#f6f3ee"/>

  <!-- Head (filled) -->
  <circle cx="256" cy="116" r="36" fill="#8b9587"/>

  <g fill="none" stroke="#8b9587" stroke-linecap="round" stroke-linejoin="round">
    <!-- Torso -->
    <line x1="256" y1="152" x2="256" y2="308" stroke-width="22"/>

    <!-- Arms raised in V (namaste overhead) -->
    <path d="M256 192 L154 88" stroke-width="19"/>
    <path d="M256 192 L358 88" stroke-width="19"/>

    <!-- Standing leg (left, straight) -->
    <line x1="256" y1="308" x2="252" y2="448" stroke-width="22"/>

    <!-- Raised right leg (bent knee pointing outward, foot to inner thigh) -->
    <path d="M256 308 C 324 316, 348 368, 256 396" stroke-width="19"/>
  </g>
</svg>
